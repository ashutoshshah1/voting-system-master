<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">VoteHybrid Step-Wise Block Diagram</title>
  <desc id="desc">Clean step-wise diagram showing online voting lane, offline booth lane, shared infrastructure, and final integrity checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#101a33"/>
    </linearGradient>
    <linearGradient id="laneOnline" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="laneOffline" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="infra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="chain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4ade80"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#cbd5e1"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .laneTitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; letter-spacing: 0.7px; }
      .boxTitle { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .boxBody { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .num { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #0b1020; }
      .noteTitle { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .noteBody { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .legend { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .small { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="url(#bg)"/>

  <text x="40" y="58" class="title">VoteHybrid Block Diagram (Step-Wise, Clean View)</text>
  <text x="40" y="86" class="subtitle">Two voting lanes (Online + Offline) converging to one smart contract for final vote integrity.</text>

  <rect x="40" y="110" width="1520" height="56" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="58" y="135" class="noteTitle">Global Security Layer</text>
  <text x="58" y="155" class="noteBody">JWT auth | Role checks | Rate limiting | AES-256-GCM wallet key encryption | RFID hashing + PIN lockout | On-chain hasVoted check</text>

  <!-- ONLINE LANE -->
  <rect x="40" y="195" width="1520" height="260" rx="18" fill="#0c162e" stroke="#334155"/>
  <text x="58" y="225" class="laneTitle">ONLINE VOTING LANE</text>

  <rect x="58" y="250" width="225" height="170" rx="14" fill="url(#laneOnline)" stroke="#93c5fd" filter="url(#shadow)"/>
  <circle cx="80" cy="273" r="13" fill="#bfdbfe"/><text x="76" y="278" class="num">1</text>
  <text x="98" y="278" class="boxTitle">User Register / Login</text>
  <text x="80" y="302" class="boxBody">DApp -> POST /auth/register</text>
  <text x="80" y="320" class="boxBody">or POST /auth/login</text>
  <text x="80" y="338" class="boxBody">API returns JWT + profile</text>

  <rect x="310" y="250" width="225" height="170" rx="14" fill="url(#laneOnline)" stroke="#93c5fd" filter="url(#shadow)"/>
  <circle cx="332" cy="273" r="13" fill="#bfdbfe"/><text x="328" y="278" class="num">2</text>
  <text x="350" y="278" class="boxTitle">KYC Submission</text>
  <text x="332" y="302" class="boxBody">DApp -> POST /kyc/submit</text>
  <text x="332" y="320" class="boxBody">File stored in MinIO</text>
  <text x="332" y="338" class="boxBody">KYC status -> PENDING</text>

  <rect x="562" y="250" width="225" height="170" rx="14" fill="url(#laneOnline)" stroke="#93c5fd" filter="url(#shadow)"/>
  <circle cx="584" cy="273" r="13" fill="#bfdbfe"/><text x="580" y="278" class="num">3</text>
  <text x="602" y="278" class="boxTitle">Admin Approval</text>
  <text x="584" y="302" class="boxBody">POST /admin/kyc/:id/approve</text>
  <text x="584" y="320" class="boxBody">Wallet created + funded</text>
  <text x="584" y="338" class="boxBody">registerVoter on chain</text>

  <rect x="814" y="250" width="225" height="170" rx="14" fill="url(#laneOnline)" stroke="#93c5fd" filter="url(#shadow)"/>
  <circle cx="836" cy="273" r="13" fill="#bfdbfe"/><text x="832" y="278" class="num">4</text>
  <text x="854" y="278" class="boxTitle">Candidate Selection</text>
  <text x="836" y="302" class="boxBody">User selects candidate</text>
  <text x="836" y="320" class="boxBody">DApp confirms intent</text>
  <text x="836" y="338" class="boxBody">then requests vote relay</text>

  <rect x="1066" y="250" width="225" height="170" rx="14" fill="url(#laneOnline)" stroke="#93c5fd" filter="url(#shadow)"/>
  <circle cx="1088" cy="273" r="13" fill="#bfdbfe"/><text x="1084" y="278" class="num">5</text>
  <text x="1106" y="278" class="boxTitle">Online Vote Relay</text>
  <text x="1088" y="302" class="boxBody">POST /vote</text>
  <text x="1088" y="320" class="boxBody">API checks eligibility + hasVoted</text>
  <text x="1088" y="338" class="boxBody">submits transaction</text>

  <rect x="1318" y="250" width="225" height="170" rx="14" fill="url(#laneOnline)" stroke="#93c5fd" filter="url(#shadow)"/>
  <circle cx="1340" cy="273" r="13" fill="#bfdbfe"/><text x="1336" y="278" class="num">6</text>
  <text x="1358" y="278" class="boxTitle">Receipt + Results View</text>
  <text x="1340" y="302" class="boxBody">Tx hash shown to voter</text>
  <text x="1340" y="320" class="boxBody">Admin closes/publishes results</text>
  <text x="1340" y="338" class="boxBody">DApp reads final tally</text>

  <line x1="283" y1="335" x2="310" y2="335" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="535" y1="335" x2="562" y2="335" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="787" y1="335" x2="814" y2="335" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="1039" y1="335" x2="1066" y2="335" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="1291" y1="335" x2="1318" y2="335" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- OFFLINE LANE -->
  <rect x="40" y="485" width="1520" height="260" rx="18" fill="#0b1a1a" stroke="#2f4f4f"/>
  <text x="58" y="515" class="laneTitle">OFFLINE BOOTH LANE</text>

  <rect x="58" y="540" width="225" height="170" rx="14" fill="url(#laneOffline)" stroke="#86efac" filter="url(#shadow)"/>
  <circle cx="80" cy="563" r="13" fill="#bbf7d0"/><text x="76" y="568" class="num">1</text>
  <text x="98" y="568" class="boxTitle">RFID Scan</text>
  <text x="80" y="592" class="boxBody">Arduino RC522 reads card UID</text>
  <text x="80" y="610" class="boxBody">DApp captures UID via Web Serial</text>
  <text x="80" y="628" class="boxBody">or relay file (optional)</text>

  <rect x="310" y="540" width="225" height="170" rx="14" fill="url(#laneOffline)" stroke="#86efac" filter="url(#shadow)"/>
  <circle cx="332" cy="563" r="13" fill="#bbf7d0"/><text x="328" y="568" class="num">2</text>
  <text x="350" y="568" class="boxTitle">Session Start</text>
  <text x="332" y="592" class="boxBody">POST /offline/session/start</text>
  <text x="332" y="610" class="boxBody">Gate checks:</text>
  <text x="332" y="628" class="boxBody">PIN ready, KYC, wallet ready</text>

  <rect x="562" y="540" width="225" height="170" rx="14" fill="url(#laneOffline)" stroke="#86efac" filter="url(#shadow)"/>
  <circle cx="584" cy="563" r="13" fill="#bbf7d0"/><text x="580" y="568" class="num">3</text>
  <text x="602" y="568" class="boxTitle">Candidate + PIN</text>
  <text x="584" y="592" class="boxBody">User selects candidate</text>
  <text x="584" y="610" class="boxBody">Confirms intent</text>
  <text x="584" y="628" class="boxBody">Enters 6-digit voter PIN</text>

  <rect x="814" y="540" width="225" height="170" rx="14" fill="url(#laneOffline)" stroke="#86efac" filter="url(#shadow)"/>
  <circle cx="836" cy="563" r="13" fill="#bbf7d0"/><text x="832" y="568" class="num">4</text>
  <text x="854" y="568" class="boxTitle">Offline Verification</text>
  <text x="836" y="592" class="boxBody">POST /offline/vote</text>
  <text x="836" y="610" class="boxBody">PIN compare + lockout policy</text>
  <text x="836" y="628" class="boxBody">Election status + on-chain sync</text>

  <rect x="1066" y="540" width="225" height="170" rx="14" fill="url(#laneOffline)" stroke="#86efac" filter="url(#shadow)"/>
  <circle cx="1088" cy="563" r="13" fill="#bbf7d0"/><text x="1084" y="568" class="num">5</text>
  <text x="1106" y="568" class="boxTitle">Transaction Submit</text>
  <text x="1088" y="592" class="boxBody">API submits vote tx</text>
  <text x="1088" y="610" class="boxBody">If low balance: fund + retry once</text>
  <text x="1088" y="628" class="boxBody">Writes offline audit event</text>

  <rect x="1318" y="540" width="225" height="170" rx="14" fill="url(#laneOffline)" stroke="#86efac" filter="url(#shadow)"/>
  <circle cx="1340" cy="563" r="13" fill="#bbf7d0"/><text x="1336" y="568" class="num">6</text>
  <text x="1358" y="568" class="boxTitle">Vote Receipt</text>
  <text x="1340" y="592" class="boxBody">Tx hash returned to booth UI</text>
  <text x="1340" y="610" class="boxBody">Already-voted wallets blocked</text>
  <text x="1340" y="628" class="boxBody">No duplicate cross-channel vote</text>

  <line x1="283" y1="625" x2="310" y2="625" stroke="#4ade80" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="535" y1="625" x2="562" y2="625" stroke="#4ade80" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="787" y1="625" x2="814" y2="625" stroke="#4ade80" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="1039" y1="625" x2="1066" y2="625" stroke="#4ade80" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="1291" y1="625" x2="1318" y2="625" stroke="#4ade80" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Shared Infrastructure -->
  <rect x="40" y="775" width="1520" height="200" rx="18" fill="#111827" stroke="#374151"/>
  <text x="58" y="807" class="laneTitle">SHARED INFRASTRUCTURE (used by both lanes)</text>

  <rect x="70" y="834" width="260" height="120" rx="12" fill="url(#infra)" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="90" y="862" class="boxTitle">Online API (:4000)</text>
  <text x="90" y="884" class="boxBody">Auth, KYC, admin controls, vote relay</text>
  <text x="90" y="902" class="boxBody">Wallet creation/funding, candidate media</text>

  <rect x="356" y="834" width="260" height="120" rx="12" fill="url(#infra)" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="376" y="862" class="boxTitle">Offline API (:4100)</text>
  <text x="376" y="884" class="boxBody">RFID profile, session gates, PIN verify</text>
  <text x="376" y="902" class="boxBody">Offline vote + audit events</text>

  <rect x="642" y="834" width="240" height="120" rx="12" fill="url(#infra)" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="662" y="862" class="boxTitle">PostgreSQL</text>
  <text x="662" y="884" class="boxBody">Users, KYC, candidates,</text>
  <text x="662" y="902" class="boxBody">offline profiles, audit logs</text>

  <rect x="908" y="834" width="220" height="120" rx="12" fill="url(#infra)" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="928" y="862" class="boxTitle">MinIO / S3</text>
  <text x="928" y="884" class="boxBody">KYC documents</text>
  <text x="928" y="902" class="boxBody">Candidate images</text>

  <rect x="1154" y="820" width="376" height="148" rx="14" fill="url(#chain)" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1176" y="850" class="boxTitle">Election Smart Contract (Sepolia)</text>
  <text x="1176" y="872" class="boxBody">registerVoter | setEligibility | vote | publishResults | resetElection</text>
  <text x="1176" y="894" class="boxBody">Final integrity gate: hasVoted must be false for both online and offline paths.</text>
  <text x="1176" y="916" class="boxBody">Result: One voter wallet can only cast one vote per election cycle.</text>

  <!-- Connections to shared infra -->
  <line x1="930" y1="420" x2="200" y2="834" stroke="#cbd5e1" stroke-width="2.2" stroke-dasharray="8 6" marker-end="url(#arrowGray)"/>
  <line x1="1180" y1="420" x2="1430" y2="820" stroke="#cbd5e1" stroke-width="2.2" stroke-dasharray="8 6" marker-end="url(#arrowGray)"/>
  <line x1="930" y1="710" x2="490" y2="834" stroke="#cbd5e1" stroke-width="2.2" stroke-dasharray="8 6" marker-end="url(#arrowGray)"/>
  <line x1="1180" y1="710" x2="1430" y2="820" stroke="#cbd5e1" stroke-width="2.2" stroke-dasharray="8 6" marker-end="url(#arrowGray)"/>

  <line x1="330" y1="894" x2="356" y2="894" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <line x1="616" y1="894" x2="642" y2="894" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <line x1="882" y1="894" x2="908" y2="894" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <line x1="1128" y1="894" x2="1154" y2="894" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)"/>

  <rect x="40" y="995" width="1520" height="74" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="58" y="1022" class="noteTitle">How to read this diagram</text>
  <text x="58" y="1042" class="legend">Top lane = online steps (1-6). Middle lane = offline booth steps (1-6). Bottom = shared APIs, storage, and blockchain final validation.</text>
  <text x="58" y="1060" class="small">Proposal asset: keep this diagram as a high-level figure and describe each step in the corresponding methodology section.</text>
</svg>
